<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Robotics 3D Control</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.8); padding: 20px;
            border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
        }
        .joint-row { margin-bottom: 10px; }
        label { display: inline-block; width: 80px; }
        input[type="number"] { width: 60px; }
        button {
            margin-top: 10px; width: 100%; padding: 10px;
            background: #007bff; color: white; border: none;
            border-radius: 4px; cursor: pointer;
        }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; font-size: 0.9em; border-top: 1px solid #ccc; pt: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Robot Control</h3>
        <div id="controls">
            <div class="joint-row"><label>Joint 1:</label> <input type="number" id="j1" value="0" step="10"> deg</div>
            <div class="joint-row"><label>Joint 2:</label> <input type="number" id="j2" value="0" step="10"> deg</div>
            <div class="joint-row"><label>Joint 3:</label> <input type="number" id="j3" value="0" step="10"> deg</div>
            <div class="joint-row"><label>Joint 4:</label> <input type="number" id="j4" value="0" step="10"> deg</div>
            <div class="joint-row"><label>Joint 5:</label> <input type="number" id="j5" value="0" step="10"> deg</div>
            <div class="joint-row"><label>Joint 6:</label> <input type="number" id="j6" value="0" step="10"> deg</div>
            <button onclick="sendMove()">Send Move Command</button>
        </div>
        <div id="status">
            <strong>Current Status:</strong><br>
            J1: <span id="cur_j1">0</span>, J2: <span id="cur_j2">0</span><br>
            J3: <span id="cur_j3">0</span>, J4: <span id="cur_j4">0</span><br>
            J5: <span id="cur_j5">0</span>, J6: <span id="cur_j6">0</span>
        </div>
        <div id="extra-controls" style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
            <button onclick="toggleDance()" id="danceBtn" style="background: #28a745;">Start Dance Mode</button>
            <div style="margin-top: 10px; font-size: 0.8em; color: #666;">
                <input type="checkbox" id="limitCheck" checked> Enable Joint Limit Warning
            </div>
            <div id="warning" style="color: red; font-weight: bold; margin-top: 5px; display: none;">LIMIT REACHED!</div>
        </div>
        <div id="env-controls" style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
            <strong>Environment Model</strong><br>
            <input type="file" id="modelInput" accept=".obj,.stl" style="font-size: 0.8em; margin-top: 5px;"><br>
            <div style="margin-top: 10px; font-size: 0.8em;">
                X: <input type="number" id="envX" value="0.5" step="0.1" style="width: 40px;">
                Y: <input type="number" id="envY" value="0" step="0.1" style="width: 40px;">
                Z: <input type="number" id="envZ" value="0" step="0.1" style="width: 40px;"><br>
                RX: <input type="number" id="envRX" value="0" step="10" style="width: 40px;">
                RY: <input type="number" id="envRY" value="0" step="10" style="width: 40px;">
                RZ: <input type="number" id="envRZ" value="0" step="10" style="width: 40px;">
            </div>
            <button onclick="updateEnvModel()" style="background: #6c757d; font-size: 0.8em; padding: 5px;">Update Position</button>
        </div>
    </div>

    <script type="importmap">

        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="robot.js"></script>
    <script>
        function sendMove() {
            const joints = [
                parseFloat(document.getElementById('j1').value),
                parseFloat(document.getElementById('j2').value),
                parseFloat(document.getElementById('j3').value),
                parseFloat(document.getElementById('j4').value),
                parseFloat(document.getElementById('j5').value),
                parseFloat(document.getElementById('j6').value)
            ];
            fetch('/api/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ joints })
            }).then(r => r.json()).then(d => console.log(d));
        }

        window.toggleDance = function() {
            if (window.robotDance) window.robotDance();
        }

        window.updateEnvModel = function() {
            if (window.refreshEnvModel) window.refreshEnvModel();
        }
    </script>
</body>
</html>
